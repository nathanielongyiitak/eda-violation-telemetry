events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Define internal upstream service markers
    upstream backend_parser {
        # TASK 3: Reference the exact Docker Compose service name and target port
        server eda_parser:8000;
    }

    server {
        # TASK 3: Bind Nginx to the wildcard public interface port
        listen 80;
        server_name localhost;

        # Main API ingress routing block
        location /api/v1/ingest {
            # TASK 3: Implement proxy pass directives to route traffic upstream
            proxy_pass http://backend_parser;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_redirect off;
        }

        # Catch-all safety fallback block
        location / {
            return 404 "Error: Resource Confinement Violation - Request Location Invalid.\n";
        }
    }
}