version: '3.8'

services:
  eda_db:
    image: mongo:6.0
    container_name: eda_database
    # TASK 2: Restrict database visibility. 
    # Do NOT map ports to host. Keep communication completely inside the network.
    volumes:
      - eda_db_data:/data/db
    networks:
      - eda_internal_net
    restart: unless-stopped

  eda_parser:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eda_ingestion_engine
    environment:
      - MONGO_URI=mongodb://eda_db:27017/
    # TASK 2: Attach this service to the internal network layer
    networks:
      - eda_internal_net
    depends_on:
      - eda_db
    restart: unless-stopped

  eda_proxy:
    image: nginx:alpine
    container_name: eda_reverse_proxy
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    # TASK 2: Map the host's public HTTP port to Nginx's internal container port
    ports:
      - "80:80"
    networks:
      - eda_internal_net
    depends_on:
      - eda_parser
    restart: unless-stopped

# TASK 2: Explicitly declare the custom isolated network and volume structures
networks:
  eda_internal_net:
    driver: bridge

volumes:
  eda_db_data:
    driver: local